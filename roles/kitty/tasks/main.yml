---
- name: Install kitty
  become: true
  ansible.builtin.apt:
    name: kitty
    state: present
    update_cache: true
  tags:
    - kitty

- name: Create kitty folders
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0750'
  loop:
    - ~/.config
    - ~/.config/kitty
  tags:
    - kitty

- name: Deploy kitty config file
  ansible.builtin.template:
    src: .config/kitty/kitty.conf.j2
    dest: ~/.config/kitty/kitty.conf
    mode: '0640'
  tags:
    - kitty

- name: Set default theme
  ansible.builtin.command:
    cmd: kitty +kitten themes "{{ kitty_default_theme }}"
  changed_when: false
  tags:
    - kitty
