---
- name: Install Starship Prompt
  block:
    - name: Install Starship Prompt
      become: true
      ansible.builtin.unarchive:
        src: "{{ starship_defaults.url }}"
        dest: /usr/local/bin
        remote_src: true
        owner: root
        group: staff
        mode: 0755

    - name: Install glyph rendering fonts
      become: true
      ansible.builtin.apt:
        name: "{{ starship_font_dependencies }}"
        state: present
        update_cache: true

    - name: Allow bitmap in fonts
      become: true
      ansible.builtin.file:
        path: /etc/fonts/conf.d/70-no-bitmaps.conf
        state: absent

    - name: Ensure .config directory exists
      ansible.builtin.file:
        path: ~/.config
        state: directory
        mode: 0750

    - name: Set Starship configuration
      ansible.builtin.template:
        src: .config/starship.toml.j2
        dest: ~/.config/starship.toml
        mode: 0640
  when:
    - install_starship
  tags:
    - starship
